<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luyện Tập Trang 12-13</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
    <style>
        :root { --sky: #e3f2fd; --blue: #0288d1; --red: #f44336; --green: #2e7d32; --amber: #ffca28; }
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: var(--sky); touch-action: manipulation; }
        
        .header { background: white; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #ffca28; position: sticky; top: 0; z-index: 100; }
        .header h2 { color: var(--red); margin: 0; font-size: 16px; text-transform: uppercase; }
        .btn-exit { position: absolute; left: 10px; border: none; background: var(--red); color: white; border-radius: 12px; padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; }

        .page { display: none; width: 100vw; flex-direction: column; align-items: center; padding: 10px 0; }
        .page.active { display: flex; }
        .quiz-container { position: relative; width: 95%; max-width: 650px; background: white; border-radius: 20px; border: 4px solid #90caf9; padding: 5px; box-sizing: border-box; }
        .quiz-img { width: 100%; display: block; border-radius: 15px; pointer-events: none; }

        /* Vùng chạm Bài 1 & 2 */
        .touch-point { 
            position: absolute; border: 2px solid transparent; border-radius: 50%; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
        .touch-point.is-correct.active { border-color: var(--blue); background: rgba(2, 136, 209, 0.1); pointer-events: none; }
        @keyframes wrong-effect {
            0% { opacity: 0; transform: scale(0.7); }
            50% { opacity: 1; transform: scale(1); border-color: #ff5252; box-shadow: 0 0 15px #ff5252, inset 0 0 10px white; }
            100% { opacity: 0; transform: scale(1.2); }
        }
        .touch-point.is-wrong.flash { animation: wrong-effect 0.3s ease-out forwards; }
        .touch-point.is-wrong::after { content: '✖'; color: #f44336; font-size: 18px; font-weight: bold; opacity: 0; }
        .touch-point.is-wrong.flash::after { opacity: 1; }

        /* Style Bài 3 & 4 (Ô điền số) */
        .box-ans { 
            position: absolute; width: 8%; height: 8%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: bold; color: #ff5722; /* Màu dấu ? */
            cursor: pointer; z-index: 20; border-radius: 8px;
            background: rgba(255, 255, 255, 0.5); /* Nền mờ để thấy dấu ? */
        }
        .box-ans.filled { color: var(--green); background: white; border: 2px solid var(--green); }

        /* Bảng chọn số Picker (0-5) */
        #picker { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; justify-content: center; 
            align-items: center; z-index: 3000; 
        }
        .picker-content { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; }
        .picker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .picker-btn { padding: 15px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; background: #f0f0f0; color: var(--blue); cursor: pointer; }
        .picker-btn:active { background: #bbdefb; transform: scale(0.9); }

        .nav-bar { width: 90%; display: flex; gap: 10px; margin: 15px 0; }
        .btn-nav { flex: 1; padding: 12px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px #ccc; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-exit" onclick="location.href='../../index.html'">⬅ THOÁT</button>
    <h2>LUYỆN TẬP (TRANG 12-13)</h2>
</div>

<!-- BÀI 1 -->
<div id="p1" class="page active">
    <p style="text-align:center; font-weight:bold; color:var(--blue); margin:5px;">Bài 1: Chọn số thích hợp</p>
    <div class="quiz-container">
        <img src="../../img/b1-12.PNG" class="quiz-img">
        <!-- Tọa độ Bài 1 giữ nguyên -->
        <div class="touch-point is-wrong" style="top:17%; left:85.5%; width:4%; height:5%;"></div>
        <div class="touch-point is-correct" style="top:11%; left:90%; width:4%; height:6%;"></div>
        <div class="touch-point is-wrong" style="top:23%; left:89%; width:4%; height:5%;"></div>
        <div class="touch-point is-wrong" style="top:43%; left:11%; width:4%; height:5%;"></div>
        <div class="touch-point is-wrong" style="top:48%; left:7%; width:4%; height:5%;"></div>
        <div class="touch-point is-correct" style="top:53%; left:11%; width:4%; height:6%;"></div> 
        <div class="touch-point is-correct" style="top:44%; left:89%; width:4%; height:6%;"></div> 
        <div class="touch-point is-wrong" style="top:50%; left:85%; width:4%; height:5%;"></div>
        <div class="touch-point is-wrong" style="top:56%; left:89%; width:4%; height:5%;"></div>
        <div class="touch-point is-wrong" style="top:79%; left:7%; width:4%; height:5%;"></div>
        <div class="touch-point is-wrong" style="top:73.8%; left:10.7%; width:4%; height:5%;"></div>
        <div class="touch-point is-correct" style="top:84.7%; left:10.7%; width:4%; height:6%;"></div> 
        <div class="touch-point is-wrong" style="top:87%; left:89.4%; width:4%; height:5%;"></div>
        <div class="touch-point is-correct" style="top:81%; left:85.5%; width:4%; height:6%;"></div>
        <div class="touch-point is-wrong" style="top:75%; left:89.5%; width:4%; height:5%;"></div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p2')">BÀI 2 ➡</button>
    </div>
</div>

<!-- BÀI 2 -->
<div id="p2" class="page">
    <p style="text-align:center; font-weight:bold; color:var(--blue); margin:5px;">Bài 2: Chọn sơ đồ đúng</p>
    <div class="quiz-container">
        <img src="../../img/b2-12.PNG" class="quiz-img">
        <div class="touch-point is-correct" style="top:42%; left:60%; width:10%; height:12%; border-radius:10px;"></div>
        <div class="touch-point is-wrong" style="top:42%; left:77%; width:16%; height:15%; border-radius:10px;"></div>
        <div class="touch-point is-wrong" style="top:78%; left:60%; width:12%; height:15%; border-radius:10px;"></div>
        <div class="touch-point is-correct" style="top:78%; left:77%; width:17%; height:15%; border-radius:10px;"></div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p1')">⬅ BÀI 1</button>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p3')">BÀI 3 ➡</button>
    </div>
</div>

<!-- BÀI 3 -->
<div id="p3" class="page">
    <p style="text-align:center; font-weight:bold; color:var(--blue); margin:5px;">Bài 3: Số?</p>
    <div class="quiz-container">
        <img src="../../img/b3-13.PNG" class="quiz-img">
        <!-- Chỉnh tọa độ box-ans cho khớp dấu ? của đoàn tàu -->
        <div class="box-ans" style="top:32%; left:45.5%;" onclick="openPicker(this, 4)">?</div>
        <div class="box-ans" style="top:32%; left:68.5%;" onclick="openPicker(this, 5)">?</div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p2')">⬅ BÀI 2</button>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p4')">BÀI 4 ➡</button>
    </div>
</div>

<!-- BÀI 4 -->
<div id="p4" class="page">
    <p style="text-align:center; font-weight:bold; color:var(--blue); margin:5px;">Bài 4: Số?</p>
    <div class="quiz-container">
        <img src="../../img/b4-13.PNG" class="quiz-img">
        <div class="box-ans" style="top:62.5%; left:43.5%;" onclick="openPicker(this, 3)">?</div>
        <div class="box-ans" style="top:62.5%; left:88%;" onclick="openPicker(this, 1)">?</div>
        <div class="box-ans" style="top:84.5%; left:43.5%;" onclick="openPicker(this, 5)">?</div>
        <div class="box-ans" style="top:84.5%; left:88%;" onclick="openPicker(this, 4)">?</div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p3')">⬅ BÀI 3</button>
    </div>
</div>

<!-- Bảng chọn số Picker (0-5) -->
<div id="picker">
    <div class="picker-content">
        <p style="font-weight:bold; color:var(--blue);">Bé chọn số mấy?</p>
        <div class="picker-grid" id="picker-grid"></div>
        <button onclick="closePicker()" style="margin-top:20px; padding:10px 20px; border-radius:10px; border:none; background:#eee;">Đóng</button>
    </div>
</div>

<script>
    const sndDung = new Audio('../../audio/dung.mp3');
    const sndSai = new Audio('../../audio/sai.mp3');
    let currentBox = null;
    let correctAnswer = null;

    function initPicker() {
        const grid = document.getElementById('picker-grid');
        grid.innerHTML = '';
        for(let i=0; i<=5; i++) {
            const btn = document.createElement('button');
            btn.className = 'picker-btn';
            btn.innerText = i;
            btn.onclick = () => checkResult(i);
            grid.appendChild(btn);
        }
    }

    function openPicker(box, ans) {
        if(box.classList.contains('filled')) return;
        currentBox = box;
        correctAnswer = ans;
        document.getElementById('picker').style.display = 'flex';
    }

    function closePicker() { document.getElementById('picker').style.display = 'none'; }

    function fireConfetti() {
        let count = 0;
        const interval = setInterval(() => {
            confetti({ 
                particleCount: 100, spread: 70, origin: { y: 0.6 }, zIndex: 4000 
            });
            count++;
            if(count >= 3) clearInterval(interval);
        }, 400);
    }

    function checkResult(num) {
        if(num === correctAnswer) {
            currentBox.innerText = num;
            currentBox.classList.add('filled');
            play(sndDung);
            fireConfetti();
            closePicker();
        } else {
            play(sndSai);
            const content = document.querySelector('.picker-content');
            content.style.transform = 'translateX(10px)';
            setTimeout(() => content.style.transform = 'translateX(-10px)', 50);
            setTimeout(() => content.style.transform = 'translateX(0)', 100);
        }
    }

    document.addEventListener('click', function(e) {
        const el = e.target;
        if (!el.classList.contains('touch-point')) return;
        if (el.classList.contains('is-correct')) {
            if (el.classList.contains('active')) return;
            el.classList.add('active');
            play(sndDung);
            fireConfetti();
        } else {
            el.classList.add('flash');
            play(sndSai);
            setTimeout(() => el.classList.remove('flash'), 300);
        }
    });

    function play(s) { s.pause(); s.currentTime = 0; s.play().catch(e=>{}); }
    function goPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    window.onload = initPicker;
</script>
</body>
</html>
