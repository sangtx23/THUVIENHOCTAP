<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bài 1: Các số 0, 1, 2, 3, 4, 5</title>
    <style>
        :root { --sky: #e3f2fd; --pink: #f06292; --blue: #0288d1; --green: #4caf50; --amber: #ff8f00; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: var(--sky); overflow: hidden; touch-action: manipulation; }
        
        .header { background: white; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #ffca28; position: relative; }
        .header h2 { color: #f44336; margin: 0; font-size: 16px; text-transform: uppercase; }
        .btn-exit { position: absolute; left: 10px; border: none; background: #546e7a; color: white; border-radius: 5px; padding: 5px 10px; font-size: 12px; }

        .page { display: none; width: 100vw; height: calc(100vh - 50px); flex-direction: column; align-items: center; padding: 10px 0; box-sizing: border-box; overflow-y: auto; }
        .page.active { display: flex; }

        /* Trang 1: Khám phá */
        .box-study { background: white; padding: 10px; border-radius: 20px; border: 5px solid #81d4fa; width: 85%; text-align: center; margin-bottom: 5px; }
        #tank { height: 70px; background: #e1f5fe; border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 5px; }
        #numBig { font-size: 80px; font-weight: bold; line-height: 1; margin: 5px 0; }
        .dock { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 90%; padding: 10px; }
        .btn-n { height: 50px; border: none; border-radius: 12px; color: white; font-size: 24px; font-weight: bold; }

        /* Trang 2: Tập viết - Đã căn chỉnh lại kích thước mẫu */
        .write-container { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 15px; width: 98%; margin-bottom: 10px; }
        
        .guide-box { 
            width: 35%; /* Thu nhỏ lại để không bị quá to */
            aspect-ratio: 1/1; 
            background: white; 
            border: 2px solid #ffca28; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 5px; 
            position: relative; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        
        .writing-area { 
            width: 55%; /* Bảng viết to hơn mẫu */
            aspect-ratio: 1/1; 
            background: white; 
            border: 3px solid #90caf9; 
            border-radius: 15px; 
            background-image: linear-gradient(#b3e5fc 1px, transparent 1px), linear-gradient(90deg, #b3e5fc 1px, transparent 1px); 
            background-size: 25px 25px; 
        }
        
        canvas { width: 100%; height: 100%; touch-action: none; display: block; }

        /* Trang 3: Bài tập */
        .card { width: 92%; background: white; border-radius: 15px; padding: 12px; border: 3px solid var(--pink); margin-bottom: 10px; box-sizing: border-box; }
        .card-title { color: var(--pink); font-weight: bold; margin: 0 0 10px 0; font-size: 14px; border-left: 4px solid var(--pink); padding-left: 8px; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .quiz-item { border: 1px solid #fce4ec; border-radius: 12px; padding: 8px; text-align: center; background: #fffafb; display: flex; flex-direction: column; align-items: center; }
        .img-wrap { height: 55px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .img-wrap img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .ans { width: 45px; height: 32px; background: #fff8e1; border: 1px dashed #ffb300; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; color: #ff6f00; font-size: 18px; }
        .ans.correct { background: var(--green) !important; color: white !important; border-style: solid !important; }
        
        .nav-bar { width: 90%; display: flex; gap: 10px; margin-top: auto; padding-bottom: 15px; }
        .btn-nav { flex: 1; padding: 12px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-exit" onclick="location.href='index.html'">⬅ THOÁT</button>
    <h2>CÁC SỐ 0, 1, 2, 3, 4, 5</h2>
</div>

<div id="p1" class="page active">
    <div class="box-study">
        <div id="tank"></div>
        <div id="numBig">1</div>
        <div id="txtBig" style="font-weight:bold; color:#546e7a;">một</div>
    </div>
    <div class="dock" id="dock"></div>
    <div class="nav-bar">
        <div style="flex:1"></div>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p2')">TẬP VIẾT ➡</button>
    </div>
</div>

<div id="p2" class="page">
    <div style="display:flex; gap:5px; margin-bottom:15px; flex-wrap:wrap; justify-content:center;" id="wNav"></div>
    
    <div class="write-container">
        <div class="guide-box">
            <span style="position: absolute; top: 2px; left: 5px; font-size: 8px; color: #f44336; font-weight: bold; opacity: 0.6;">MẪU</span>
            <img id="guideImg" src="" style="width: 85%; height: 85%; object-fit: contain;">
        </div>
        <div class="writing-area">
            <canvas id="writingBoard" width="280" height="280"></canvas>
        </div>
    </div>

    <div style="display:flex; gap:15px; align-items: center; margin-bottom: 10px;">
        <button onclick="clearCanvas()" style="padding:10px 20px; border-radius:10px; border:none; background:#546e7a; color:white; font-weight:bold; box-shadow: 0 3px #37474f;">XÓA</button>
        <button onclick="changeColor('#f44336')" style="border-radius:50%; border:3px solid white; background:#f44336; width:40px; height:40px;"></button>
        <button onclick="changeColor('#4caf50')" style="border-radius:50%; border:3px solid white; background:#4caf50; width:40px; height:40px;"></button>
    </div>

    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p1')">⬅ KHÁM PHÁ</button>
        <button class="btn-nav" style="background:var(--pink);" onclick="goPage('p3')">BÀI TẬP ➡</button>
    </div>
</div>

<div id="p3" class="page">
    <div class="card">
        <p class="card-title">Bài 2a: Bé đếm rồi chọn số:</p>
        <div class="quiz-grid">
            <div class="quiz-item"><div class="img-wrap"><img src="img/meo.PNG"></div><div class="ans" onclick="ask(this,1)">?</div></div>
            <div class="quiz-item"><div class="img-wrap"><img src="img/carot.PNG"></div><div class="ans" onclick="ask(this,3)">?</div></div>
            <div class="quiz-item"><div class="img-wrap"><img src="img/cho.PNG"></div><div class="ans" onclick="ask(this,5)">?</div></div>
        </div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p1')">⬅ KHÁM PHÁ</button>
    </div>
</div>

<div id="picker" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:2000;">
    <div style="background:white;padding:20px;border-radius:20px;width:80%;max-width:300px;text-align:center;">
        <p><b>Bé chọn số mấy?</b></p>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:15px 0;" id="pg"></div>
        <button onclick="document.getElementById('picker').style.display='none'" style="border:none;background:#eee;padding:10px;border-radius:10px;">HỦY</button>
    </div>
</div>

<script>
    const cfg = { words:['không','một','hai','ba','bốn','năm'], clrs:['#90a4ae','#f44336','#4caf50','#ff9800','#9c27b0','#2196f3'], fishes:['🐟','🐠','🐡'] };
    let canvas, ctx, drawing=false, curNum=1, targetEl=null, correctVal=null;

    function init() {
        const d = document.getElementById('dock'), wNav = document.getElementById('wNav'), pg = document.getElementById('pg');
        for(let i=0; i<=5; i++){
            let b = document.createElement('button'); b.className='btn-n'; b.style.background=cfg.clrs[i]; b.innerText=i; b.onclick=()=>updateKP(i); d.appendChild(b);
            let b2 = b.cloneNode(true); b2.style.height="40px"; b2.style.fontSize="16px"; b2.onclick=()=>drawT(i); wNav.appendChild(b2);
            let b3 = document.createElement('button'); b3.innerText=i; b3.style.height="55px"; b3.style.fontSize="22px"; b3.style.borderRadius="12px"; b3.style.border="none"; b3.style.background="#e1f5fe"; b3.style.color="#0288d1"; b3.style.fontWeight="bold"; b3.onclick=()=>check(i); pg.appendChild(b3);
        }
        setupC(); updateKP(1);
    }

    function updateKP(i) {
        document.getElementById('numBig').innerText=i; document.getElementById('numBig').style.color=cfg.clrs[i]; document.getElementById('txtBig').innerText=cfg.words[i];
        const t=document.getElementById('tank'); t.innerHTML=''; for(let j=0; j<i; j++) t.innerHTML+=`<span style="font-size:30px">${cfg.fishes[j%3]}</span>`;
        new Audio(`audio/${i}.mp3`).play().catch(()=>{});
    }

    function goPage(id) {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active');
        if(id==='p2') setTimeout(()=>drawT(curNum),100);
    }

    function setupC() {
        canvas=document.getElementById('writingBoard'); ctx=canvas.getContext('2d'); ctx.strokeStyle="#4caf50"; ctx.lineWidth=15; ctx.lineCap="round"; ctx.lineJoin="round";
        const getP=(e)=>{ const r=canvas.getBoundingClientRect(); const c=e.touches?e.touches[0]:e; return {x:c.clientX-r.left, y:c.clientY-r.top}; };
        const s=(e)=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); };
        const m=(e)=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); };
        const st=()=>{ drawing=false; };
        canvas.addEventListener('mousedown',s); canvas.addEventListener('mousemove',m); window.addEventListener('mouseup',st);
        canvas.addEventListener('touchstart',s,{passive:false}); canvas.addEventListener('touchmove',m,{passive:false}); canvas.addEventListener('touchend',st);
    }

    function drawT(n) {
        curNum = n;
        ctx.clearRect(0,0,280,280);
        ctx.font="bold 200px Arial"; ctx.fillStyle="#f8f8f8"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(n,140,140);
        document.getElementById('guideImg').src = `img/so${n}.PNG`;
    }

    function clearCanvas() { drawT(curNum); }
    function changeColor(c) { ctx.strokeStyle=c; }
    function ask(el,v) { targetEl=el; correctVal=v; document.getElementById('picker').style.display='flex'; }
    function check(n) {
        if(n===correctVal) { 
            targetEl.innerText=n; targetEl.classList.add('correct'); 
            new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3').play().catch(()=>{});
            document.getElementById('picker').style.display='none'; 
        }
        else alert("Bé đếm lại xem nào! ☘️");
    }

    window.onload = init;
</script>
</body>
</html>
