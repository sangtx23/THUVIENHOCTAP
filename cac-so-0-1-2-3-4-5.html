<div id="pageHoatDong" class="page">
    <div class="activity-container">
        <div class="section-exercise">
            <p class="exercise-title"><b>Bài 2:</b> Số ?</p>
            <div class="grid-quiz">
                <div class="quiz-box">
                    <div class="img-content">🥕🥕🥕</div>
                    <div class="answer-zone" onclick="showNumberPicker(this, 3)">?</div>
                </div>
                <div class="quiz-box">
                    <div class="img-content">🐱</div>
                    <div class="answer-zone" onclick="showNumberPicker(this, 1)">?</div>
                </div>
                <div class="quiz-box">
                    <div class="img-content">🧪🐠🐠</div>
                    <div class="answer-zone" onclick="showNumberPicker(this, 2)">?</div>
                </div>
                <div class="quiz-box">
                    <div class="img-content">🧪</div>
                    <div class="answer-zone" onclick="showNumberPicker(this, 0)">?</div>
                </div>
            </div>
        </div>

        <div class="section-exercise" style="margin-top:20px;">
            <p class="exercise-title"><b>Bài 3:</b> Số ?</p>
            <div class="flag-line">
                <div class="flag-item"><div class="flag-shape">0</div><div class="dice"></div></div>
                <div class="flag-item"><div class="flag-shape">1</div><div class="dice">●</div></div>
                <div class="flag-item"><div class="flag-shape highlight" onclick="showNumberPicker(this, 2)">?</div><div class="dice">●●</div></div>
                <div class="flag-item"><div class="flag-shape highlight" onclick="showNumberPicker(this, 3)">?</div><div class="dice">●●<br>●</div></div>
                <div class="flag-item"><div class="flag-shape">4</div><div class="dice">●●<br>●●</div></div>
                <div class="flag-item"><div class="flag-shape">5</div><div class="dice">●●●<br>●●</div></div>
            </div>
        </div>
    </div>

    <div id="numberPicker" class="picker-hidden">
        <div class="picker-content">
            <p>Bé chọn số mấy?</p>
            <div class="picker-grid">
                <button onclick="pickNumber(0)">0</button>
                <button onclick="pickNumber(1)">1</button>
                <button onclick="pickNumber(2)">2</button>
                <button onclick="pickNumber(3)">3</button>
                <button onclick="pickNumber(4)">4</button>
                <button onclick="pickNumber(5)">5</button>
            </div>
            <button class="btn-close" onclick="closePicker()">Đóng</button>
        </div>
    </div>

    <button class="nav-btn" onclick="changePage('pageKhapPha')">⬅ QUAY LẠI HỌC</button>
</div>

<style>
    /* CSS CHO ĐỘ CHÍNH XÁC CAO */
    .section-exercise { background: #fff; padding: 15px; border-radius: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
    .exercise-title { color: #d81b60; margin: 0 0 10px 0; font-size: 18px; }
    
    /* Grid cho bài 2 */
    .grid-quiz { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .quiz-box { border: 2px solid #e1f5fe; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    .img-content { font-size: 30px; height: 50px; display: flex; align-items: center; }
    .answer-zone { width: 50px; height: 40px; background: #fff8e1; border: 2px dashed #ffb300; border-radius: 10px; 
                   display: flex; align-items: center; justify-content: center; font-weight: bold; color: #ff6f00; cursor: pointer; }
    .answer-zone.correct { background: #4caf50; border-style: solid; border-color: #2e7d32; color: white; }

    /* Style Lá cờ & Xúc xắc bài 3 */
    .flag-line { display: flex; justify-content: space-between; align-items: flex-start; }
    .flag-item { display: flex; flex-direction: column; align-items: center; width: 15%; }
    .flag-shape { width: 100%; height: 50px; background: #4caf50; color: white; display: flex; align-items: center; 
                  justify-content: center; font-weight: bold; clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 80%, 0% 100%); }
    .flag-shape.highlight { background: #ffca28; color: #f44336; cursor: pointer; }
    .dice { margin-top: 5px; font-size: 10px; color: #f44336; min-height: 30px; text-align: center; line-height: 1; }

    /* Pop-up chọn số */
    .picker-hidden { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); 
                     display: none; justify-content: center; align-items: center; z-index: 1000; }
    .picker-content { background: white; padding: 25px; border-radius: 30px; text-align: center; width: 80%; max-width: 300px; }
    .picker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
    .picker-grid button { height: 60px; font-size: 24px; border: none; border-radius: 15px; background: #e1f5fe; color: #0288d1; font-weight: bold; }
    .btn-close { background: #546e7a; color: white; border: none; padding: 10px 20px; border-radius: 10px; }
</style>

<script>
    let currentTarget = null;
    let currentCorrectValue = null;

    function showNumberPicker(element, correctVal) {
        currentTarget = element;
        currentCorrectValue = correctVal;
        document.getElementById('numberPicker').style.display = 'flex';
    }

    function closePicker() {
        document.getElementById('numberPicker').style.display = 'none';
    }

    function pickNumber(num) {
        if (num === currentCorrectValue) {
            currentTarget.innerText = num;
            currentTarget.classList.add('correct');
            new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3').play().catch(()=>{}); // Âm thanh khen ngợi
            setTimeout(() => { alert("Đúng rồi! Bé giỏi quá! ✨"); }, 200);
            closePicker();
        } else {
            alert("Chưa đúng, bé đếm lại nhé!");
        }
    }
</script>
