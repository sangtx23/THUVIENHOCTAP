<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bài 1: Các số 0, 1, 2, 3, 4, 5</title>
    <style>
        :root { --sky: #e3f2fd; --pink: #f06292; --blue: #0288d1; --green: #4caf50; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: var(--sky); touch-action: manipulation; }
        
        /* Header */
        .header { background: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #ffca28; position: sticky; top: 0; z-index: 100; }
        .header h2 { color: #f44336; margin: 0; font-size: 16px; }

        /* Page System */
        .page { display: none; width: 100vw; min-height: 90vh; flex-direction: column; align-items: center; padding: 15px 0; }
        .page.active { display: flex; }

        /* --- TRANG 2: TẬP VIẾT (BẢNG Ô LY) --- */
        .writing-area { background: white; border: 5px solid #90caf9; border-radius: 15px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #writingBoard { cursor: crosshair; touch-action: none; background-image: 
            linear-gradient(#b3e5fc 1px, transparent 1px), 
            linear-gradient(90deg, #b3e5fc 1px, transparent 1px); 
            background-size: 40px 40px; }
        .write-tools { display: flex; gap: 8px; margin-top: 15px; }
        .tool-btn { padding: 12px 15px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; }

        /* --- TRANG 3: HOẠT ĐỘNG (THEO ẢNH SGK) --- */
        .card-container { width: 90%; max-width: 450px; background: white; border-radius: 20px; padding: 15px; border: 5px solid var(--pink); margin-bottom: 15px; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .quiz-item { border: 2px solid #fce4ec; border-radius: 15px; padding: 10px; text-align: center; background: #fffafb; }
        .emoji-box { font-size: 35px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .ans-box { width: 55px; height: 40px; background: #fff8e1; border: 2px dashed #ffb300; border-radius: 10px; margin: 8px auto 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; cursor: pointer; color: #ff6f00; }
        .ans-box.correct { background: var(--green) !important; color: white !important; border-style: solid !important; border-color: #2e7d32 !important; }

        /* BÀI 3: LÁ CỜ */
        .flag-row { display: flex; justify-content: space-between; width: 100%; margin-top: 15px; }
        .flag { width: 15%; display: flex; flex-direction: column; align-items: center; }
        .flag-top { width: 100%; height: 50px; background: var(--green); color: white; display: flex; align-items: center; justify-content: center; clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 80%, 0% 100%); font-weight: bold; font-size: 20px; }
        .flag-top.q-mark { background: #ffca28; color: #f44336; cursor: pointer; border: 1px solid #f44336; }
        .dice-dot { color: #f44336; font-size: 11px; min-height: 35px; text-align: center; line-height: 1; margin-top: 5px; font-weight: bold; }

        /* Nút điều hướng */
        .nav-btn { margin: 15px 0; padding: 15px 35px; border-radius: 30px; border: none; background: #ff9800; color: white; font-weight: bold; font-size: 18px; box-shadow: 0 5px 0 #e65100; cursor: pointer; }
        
        /* Picker chọn số */
        #picker { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); display:none; justify-content:center; align-items:center; z-index:2000; }
        .picker-content { background:white; padding:25px; border-radius:25px; width:85%; max-width:320px; text-align:center; border: 4px solid var(--blue); }
        .p-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .p-grid button { height:60px; font-size:24px; border-radius:15px; border:none; background:#e1f5fe; color: var(--blue); font-weight:bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <button onclick="location.href='index.html'" style="border:none; background:#546e7a; color:white; border-radius:8px; padding:8px 12px; font-weight:bold;">⬅ THOÁT</button>
    <h2 id="title">BÀI 1: KHÁM PHÁ</h2>
    <div style="width:50px;"></div>
</div>

<div id="p1" class="page active">
    <div style="background:white; padding:25px; border-radius:30px; border:8px solid #81d4fa; width:85%; text-align:center; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
        <div id="tank" style="height:120px; background:#e1f5fe; border-radius:20px; display:flex; flex-wrap:wrap; justify-content:center; align-content:center; gap:8px;"></div>
        <div id="numBig" style="font-size:120px; font-weight:bold; line-height:1; margin: 10px 0;">1</div>
        <div id="txtBig" style="font-size:28px; color:#546e7a; font-weight:bold;">một</div>
    </div>
    <div id="dock" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:25px; width:90%;"></div>
    <button class="nav-btn" onclick="goPage('p2')">TIẾP: TẬP VIẾT SỐ ➡</button>
</div>

<div id="p2" class="page">
    <h3 style="color:var(--blue); margin: 0 0 10px 0;">1. Bé tập viết số</h3>
    <div style="display:flex; gap:8px; margin-bottom:15px;" id="writeNav"></div>
    <div class="writing-area">
        <canvas id="writingBoard" width="320" height="320"></canvas>
    </div>
    <div class="write-tools">
        <button class="tool-btn" style="background:#546e7a;" onclick="clearCanvas()">XÓA LÀM LẠI</button>
        <button class="tool-btn" style="background:#f44336;" onclick="changeColor('#f44336')">MÀU ĐỎ</button>
        <button class="tool-btn" style="background:#4caf50;" onclick="changeColor('#4caf50')">MÀU XANH</button>
    </div>
    <button class="nav-btn" onclick="goPage('p3')" style="background:var(--pink); box-shadow:0 5px 0 #ad1457; margin-top:25px;">TIẾP: BÀI TẬP ➡</button>
</div>

<div id="p3" class="page">
    <div class="card-container">
        <p style="color:var(--pink); font-weight:bold; margin-top:0; font-size:18px;">2. Bé đếm rồi chọn số:</p>
        <div class="quiz-grid">
            <div class="quiz-item"><div class="emoji-box">🐱</div><div class="ans-box" onclick="ask(this,1)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">🥕🥕🥕</div><div class="ans-box" onclick="ask(this,3)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">🐕🐕🐕🐕🐕</div><div class="ans-box" onclick="ask(this,5)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">⚽⚽⚽⚽</div><div class="ans-box" onclick="ask(this,4)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">🦆🦆</div><div class="ans-box" onclick="ask(this,2)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">🐠🐠🐠</div><div class="ans-box" onclick="ask(this,3)">?</div></div>
        </div>
    </div>

    <div class="card-container">
        <p style="color:var(--pink); font-weight:bold; margin-top:0; font-size:18px;">3. Số ?</p>
        <div class="flag-row">
            <div class="flag"><div class="flag-top" style="background:#f06292;">0</div><div class="dice-dot"></div></div>
            <div class="flag"><div class="flag-top" style="background:#ffeb3b; color:#333;">1</div><div class="dice-dot">●</div></div>
            <div class="flag"><div class="flag-top q-mark" onclick="ask(this,2)">?</div><div class="dice-dot">●●</div></div>
            <div class="flag"><div class="flag-top q-mark" onclick="ask(this,3)">?</div><div class="dice-dot">●●<br>●</div></div>
            <div class="flag"><div class="flag-top" style="background:#2196f3;">4</div><div class="dice-dot">●●<br>●●</div></div>
            <div class="flag"><div class="flag-top" style="background:#f44336;">5</div><div class="dice-dot">●●●<br>●●</div></div>
        </div>
    </div>
    <button class="nav-btn" onclick="goPage('p1')" style="background:#546e7a; box-shadow:0 5px 0 #37474f;">⬅ QUAY LẠI HỌC</button>
</div>

<div id="picker"><div class="picker-content"><b>Bé chọn số mấy?</b><div class="p-grid" id="pg"></div><button onclick="document.getElementById('picker').style.display='none'" style="border:none; background:#eee; padding:10px 20px; border-radius:10px;">Hủy bỏ</button></div></div>

<script>
    const cfg = {
        words: ['không','một','hai','ba','bốn','năm'],
        clrs: ['#90a4ae','#f44336','#4caf50','#ff9800','#9c27b0','#2196f3'],
        fishes: ['🐟','🐠','🐡']
    };
    let targetEl = null, correctVal = null;
    let canvas, ctx, drawing = false;
    let currentWriteNum = 0;

    function init() {
        const d = document.getElementById('dock');
        const wNav = document.getElementById('writeNav');
        const pg = document.getElementById('pg');
        
        for(let i=0; i<=5; i++){
            // Nút Khám phá
            let b = document.createElement('button'); b.innerText = i; b.style.cssText = `height:60px; border:none; border-radius:15px; background:${cfg.clrs[i]}; color:white; font-size:26px; font-weight:bold; box-shadow: 0 4px rgba(0,0,0,0.2);`;
            b.onclick = () => updateKhapPha(i); d.appendChild(b);
            
            // Nút chọn số Tập viết
            let b2 = b.cloneNode(true); b2.style.height = "45px"; b2.style.fontSize = "18px"; b2.onclick = () => drawTemplate(i); wNav.appendChild(b2);
            
            // Nút Picker
            let b3 = document.createElement('button'); b3.innerText = i; b3.onclick = () => checkResult(i); pg.appendChild(b3);
        }
        
        setupCanvas();
        updateKhapPha(1);
    }

    function updateKhapPha(i) {
        document.getElementById('numBig').innerText = i;
        document.getElementById('numBig').style.color = cfg.clrs[i];
        document.getElementById('txtBig').innerText = cfg.words[i];
        const t = document.getElementById('tank'); t.innerHTML = '';
        for(let j=0; j<i; j++) t.innerHTML += `<span style="font-size:40px">${cfg.fishes[j%3]}</span>`;
        new Audio(`audio/${i}.mp3`).play().catch(()=>{});
    }

    function goPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const titles = {p1: "BÀI 1: KHÁM PHÁ", p2: "BÀI 1: TẬP VIẾT SỐ", p3: "BÀI 1: HOẠT ĐỘNG"};
        document.getElementById('title').innerText = titles[id];
        
        // Sửa lỗi Canvas: Khi lật trang mới vẽ số mẫu
        if(id === 'p2') {
            setTimeout(() => drawTemplate(currentWriteNum), 100);
        }
    }

    function setupCanvas() {
        canvas = document.getElementById('writingBoard');
        ctx = canvas.getContext('2d');
        ctx.strokeStyle = "#4caf50";
        ctx.lineWidth = 18;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        const start = (e) => { drawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault(); };
        const move = (e) => { if(!drawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); };
        const stop = () => { drawing = false; };

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        canvas.addEventListener('touchend', stop);
    }

    function drawTemplate(n) {
        currentWriteNum = n;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = "bold 260px Arial";
        ctx.fillStyle = "#f0f0f0";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(n, 160, 165);
    }

    function clearCanvas() { drawTemplate(currentWriteNum); }
    function changeColor(c) { ctx.strokeStyle = c; }

    function ask(el, val) { targetEl = el; correctVal = val; document.getElementById('picker').style.display='flex'; }
    function checkResult(n) {
        if(n === correctVal) { 
            targetEl.innerText = n; 
            targetEl.classList.add('correct');
            alert("Đúng rồi! Bé giỏi quá! 🌟"); 
            document.getElementById('picker').style.display='none';
        } else alert("Chưa đúng, bé đếm lại nhé! ☘️");
    }

    window.onload = init;
</script>
</body>
</html>
