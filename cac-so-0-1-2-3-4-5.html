<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bài 1: Các số 0, 1, 2, 3, 4, 5</title>
    <style>
        :root { --sky: #e3f2fd; --pink: #f06292; --blue: #0288d1; --green: #4caf50; --amber: #ff8f00; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: var(--sky); overflow: hidden; touch-action: manipulation; }
        
        .header { background: white; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #ffca28; position: relative; }
        .header h2 { color: #f44336; margin: 0; font-size: 16px; text-transform: uppercase; }
        .btn-exit { position: absolute; left: 10px; border: none; background: #546e7a; color: white; border-radius: 5px; padding: 5px 10px; font-size: 12px; }

        .page { display: none; width: 100vw; height: calc(100vh - 50px); flex-direction: column; align-items: center; padding: 10px 0; box-sizing: border-box; overflow-y: auto; }
        .page.active { display: flex; }

        /* Trang 1: Khám phá */
        .box-study { background: white; padding: 10px; border-radius: 20px; border: 5px solid #81d4fa; width: 85%; text-align: center; margin-bottom: 5px; }
        #tank { height: 70px; background: #e1f5fe; border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 5px; }
        #numBig { font-size: 80px; font-weight: bold; line-height: 1; margin: 5px 0; }
        .dock { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 90%; padding: 10px; }
        .btn-n { height: 50px; border: none; border-radius: 12px; color: white; font-size: 24px; font-weight: bold; }

        /* Trang 2: Tập viết - Đã căn chỉnh lại kích thước mẫu */
        .write-container { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 15px; width: 98%; margin-bottom: 10px; }
        
        .guide-box { 
            width: 35%; /* Thu nhỏ lại để không bị quá to */
            aspect-ratio: 1/1; 
            background: white; 
            border: 2px solid #ffca28; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 5px; 
            position: relative; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        
        .writing-area { 
            width: 55%; /* Bảng viết to hơn mẫu */
            aspect-ratio: 1/1; 
            background: white; 
            border: 3px solid #90caf9; 
            border-radius: 15px; 
            background-image: linear-gradient(#b3e5fc 1px, transparent 1px), linear-gradient(90deg, #b3e5fc 1px, transparent 1px); 
            background-size: 25px 25px; 
        }
        
        canvas { width: 100%; height: 100%; touch-action: none; display: block; }

        /* Trang 3: Bài tập */
        .card { width: 92%; background: white; border-radius: 15px; padding: 12px; border: 3px solid var(--pink); margin-bottom: 10px; box-sizing: border-box; }
        .card-title { color: var(--pink); font-weight: bold; margin: 0 0 10px 0; font-size: 14px; border-left: 4px solid var(--pink); padding-left: 8px; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .quiz-item { border: 1px solid #fce4ec; border-radius: 12px; padding: 8px; text-align: center; background: #fffafb; display: flex; flex-direction: column; align-items: center; }
        .img-wrap { height: 55px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .img-wrap img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .ans { width: 45px; height: 32px; background: #fff8e1; border: 1px dashed #ffb300; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; color: #ff6f00; font-size: 18px; }
        .ans.correct { background: var(--green) !important; color: white !important; border-style: solid !important; }
        
        .nav-bar { width: 90%; display: flex; gap: 10px; margin-top: auto; padding-bottom: 15px; }
        .btn-nav { flex: 1; padding: 12px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-exit" onclick="location.href='index.html'">⬅ THOÁT</button>
    <h2>CÁC SỐ 0, 1, 2, 3, 4, 5</h2>
</div>

        <div id="tank"></div>
        <div id="numBig">1</div>
        <div id="txtBig" style="font-weight:bold; color:#546e7a;">một</div>
    </div>
    <div class="dock" id="dock"></div>
    <div class="nav-bar">
        <div style="flex:1"></div>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p2')">TẬP VIẾT ➡</button>
    </div>
</div>
