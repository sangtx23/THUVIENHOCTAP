<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bài 1: Các số 0, 1, 2, 3, 4, 5</title>
    <style>
        :root { --sky: #e3f2fd; --pink: #f06292; --blue: #0288d1; --green: #4caf50; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: var(--sky); touch-action: manipulation; }
        
        .header { background: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #ffca28; position: sticky; top: 0; z-index: 100; }
        .header h2 { color: #f44336; margin: 0; font-size: 16px; }

        .page { display: none; width: 100vw; min-height: 90vh; flex-direction: column; align-items: center; padding: 15px 0; }
        .page.active { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* PHẦN TẬP VIẾT (CANVAS) */
        #writingBoard { background: white; border: 5px solid #90caf9; border-radius: 15px; cursor: crosshair; touch-action: none; background-image: linear-gradient(#e3f2fd 1px, transparent 1px), linear-gradient(90deg, #e3f2fd 1px, transparent 1px); background-size: 20px 20px; }
        .write-tools { display: flex; gap: 10px; margin-top: 10px; }
        .tool-btn { padding: 10px; border-radius: 10px; border: none; color: white; font-weight: bold; }

        /* HOẠT ĐỘNG (THEO TRÍCH XUẤT HÌNH ẢNH) */
        .card-container { width: 90%; max-width: 450px; background: white; border-radius: 20px; padding: 15px; border: 5px solid var(--pink); margin-bottom: 15px; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .quiz-item { border: 1px solid #eee; border-radius: 15px; padding: 8px; text-align: center; }
        .emoji-box { font-size: 30px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .ans-box { width: 45px; height: 35px; background: #fff8e1; border: 2px dashed #ffb300; border-radius: 8px; margin: 5px auto; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .ans-box.correct { background: var(--green); color: white; border-style: solid; }

        /* LÁ CỜ BÀI 3 */
        .flag-row { display: flex; justify-content: space-between; width: 100%; margin-top: 10px; }
        .flag { width: 14%; display: flex; flex-direction: column; align-items: center; }
        .flag-top { width: 100%; height: 40px; background: var(--green); color: white; display: flex; align-items: center; justify-content: center; clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 80%, 0% 100%); font-weight: bold; }
        .dice-dot { color: #f44336; font-size: 10px; min-height: 30px; text-align: center; line-height: 1; margin-top: 5px; }

        .nav-btn { margin: 10px 0; padding: 12px 25px; border-radius: 25px; border: none; background: #ff9800; color: white; font-weight: bold; box-shadow: 0 4px #e65100; cursor: pointer; }
        
        /* PICKER */
        #picker { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:2000; }
        .picker-content { background:white; padding:20px; border-radius:20px; width:80%; max-width:300px; text-align:center; }
        .p-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin:15px 0; }
        .p-grid button { height:50px; font-size:20px; border-radius:10px; border:none; background:#e1f5fe; font-weight:bold; }
    </style>
</head>
<body>

<div class="header">
    <button onclick="location.href='index.html'" style="border:none; background:#546e7a; color:white; border-radius:5px; padding:5px 10px;">⬅ THOÁT</button>
    <h2 id="title">BÀI 1: KHÁM PHÁ</h2>
    <div style="width:50px;"></div>
</div>

<div id="p1" class="page active">
    <div style="background:white; padding:20px; border-radius:25px; border:8px solid #81d4fa; width:85%; text-align:center;">
        <div id="tank" style="height:100px; background:#e1f5fe; border-radius:15px; display:flex; flex-wrap:wrap; justify-content:center; align-content:center; gap:5px;"></div>
        <div id="numBig" style="font-size:100px; font-weight:bold; line-height:1;">1</div>
        <div id="txtBig" style="font-size:24px; color:#546e7a; font-weight:bold;">một</div>
    </div>
    <div id="dock" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:20px; width:90%;"></div>
    <button class="nav-btn" onclick="goPage('p2')">TIẾP: TẬP VIẾT SỐ ➡</button>
</div>

<div id="p2" class="page">
    <h3 style="color:var(--blue); margin-top:0;">1. Tập viết số</h3>
    <p style="font-size:14px; color:#666;">Bé hãy chọn số và dùng tay tô theo nhé!</p>
    <div style="display:flex; gap:5px; margin-bottom:10px;" id="writeNav"></div>
    <canvas id="writingBoard" width="320" height="320"></canvas>
    <div class="write-tools">
        <button class="tool-btn" style="background:#f44336;" onclick="clearCanvas()">XÓA HẾT</button>
        <button class="tool-btn" style="background:#4caf50;" onclick="changeColor('#4caf50')">BÚT XANH</button>
        <button class="tool-btn" style="background:#2196f3;" onclick="changeColor('#2196f3')">BÚT LAM</button>
    </div>
    <button class="nav-btn" onclick="goPage('p3')" style="background:var(--pink); box-shadow:0 4px #ad1457; margin-top:20px;">TIẾP: HOẠT ĐỘNG ➡</button>
</div>

<div id="p3" class="page">
    <div class="card-container">
        <p style="color:var(--pink); font-weight:bold; margin-top:0;">2. Bé đếm rồi chọn số:</p>
        <div class="quiz-grid">
            <div class="quiz-item"><div class="emoji-box">🐱</div><div class="ans-box" onclick="ask(this,1)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">🥕🥕🥕</div><div class="ans-box" onclick="ask(this,3)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">🐕🐕🐕🐕🐕</div><div class="ans-box" onclick="ask(this,5)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">⚽⚽⚽⚽</div><div class="ans-box" onclick="ask(this,4)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">🦆🦆</div><div class="ans-box" onclick="ask(this,2)">?</div></div>
            <div class="quiz-item"><div class="emoji-box">🧪🐠🐠🐠</div><div class="ans-box" onclick="ask(this,3)">?</div></div>
        </div>
    </div>

    <div class="card-container">
        <p style="color:var(--pink); font-weight:bold; margin-top:0;">3. Số ?</p>
        <div class="flag-row">
            <div class="flag"><div class="flag-top" style="background:#f06292;">0</div><div class="dice-dot"></div></div>
            <div class="flag"><div class="flag-top" style="background:#ffeb3b; color:#333;">1</div><div class="dice-dot">●</div></div>
            <div class="flag"><div class="flag-top" style="background:#4caf50;" onclick="ask(this,2)">?</div><div class="dice-dot">●●</div></div>
            <div class="flag"><div class="flag-top" style="background:#ff9800;" onclick="ask(this,3)">?</div><div class="dice-dot">●●<br>●</div></div>
            <div class="flag"><div class="flag-top" style="background:#2196f3;">4</div><div class="dice-dot">●●<br>●●</div></div>
            <div class="flag"><div class="flag-top" style="background:#f44336;">5</div><div class="dice-dot">●●●<br>●●</div></div>
        </div>
    </div>
    <button class="nav-btn" onclick="goPage('p1')" style="background:#546e7a; box-shadow:0 4px #37474f;">⬅ QUAY LẠI HỌC</button>
</div>

<div id="picker"><div class="picker-content"><b>Bé chọn số mấy?</b><div class="p-grid" id="pg"></div><button onclick="document.getElementById('picker').style.display='none'">Đóng</button></div></div>

<script>
    const cfg = {
        words: ['không','một','hai','ba','bốn','năm'],
        clrs: ['#90a4ae','#f44336','#4caf50','#ff9800','#9c27b0','#2196f3'],
        fishes: ['🐟','🐠','🐡']
    };
    let targetEl = null, correctVal = null;

    // KHỞI TẠO KHÁM PHÁ
    function init() {
        const d = document.getElementById('dock');
        const wNav = document.getElementById('writeNav');
        const pg = document.getElementById('pg');
        for(let i=0; i<=5; i++){
            // Nút trang 1
            let b = document.createElement('button'); b.innerText = i; b.style.cssText = `height:60px; border:none; border-radius:10px; background:${cfg.clrs[i]}; color:white; font-size:24px; font-weight:bold;`;
            b.onclick = () => update(i); d.appendChild(b);
            // Nút trang 2
            let b2 = b.cloneNode(true); b2.style.height = "40px"; b2.onclick = () => drawTemplate(i); wNav.appendChild(b2);
            // Nút picker
            let b3 = document.createElement('button'); b3.innerText = i; b3.onclick = () => check(i); pg.appendChild(b3);
        }
        update(1); setupCanvas();
    }

    function update(i) {
        document.getElementById('numBig').innerText = i; document.getElementById('numBig').style.color = cfg.clrs[i];
        document.getElementById('txtBig').innerText = cfg.words[i];
        const t = document.getElementById('tank'); t.innerHTML = '';
        for(let j=0; j<i; j++) t.innerHTML += `<span style="font-size:35px">${cfg.fishes[j%3]}</span>`;
        new Audio(`audio/${i}.mp3`).play().catch(()=>{});
    }

    function goPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const titles = {p1: "BÀI 1: KHÁM PHÁ", p2: "BÀI 1: TẬP VIẾT SỐ", p3: "BÀI 1: HOẠT ĐỘNG"};
        document.getElementById('title').innerText = titles[id];
        if(id==='p2') drawTemplate(1);
    }

    // CANVAS LOGIC
    let ctx, drawing = false;
    function setupCanvas() {
        const cv = document.getElementById('writingBoard'); ctx = cv.getContext('2d');
        ctx.strokeStyle = "#4caf50"; ctx.lineWidth = 15; ctx.lineCap = "round";
        const getXY = (e) => { const r = cv.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return [t.clientX - r.left, t.clientY - r.top]; };
        const start = (e) => { drawing = true; ctx.beginPath(); const [x,y] = getXY(e); ctx.moveTo(x,y); };
        const move = (e) => { if(!drawing) return; const [x,y] = getXY(e); ctx.lineTo(x,y); ctx.stroke(); };
        const stop = () => { drawing = false; };
        cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
        cv.addEventListener('touchstart', start); cv.addEventListener('touchmove', move); cv.addEventListener('touchend', stop);
    }
    function drawTemplate(n) {
        clearCanvas(); ctx.font = "bold 250px Arial"; ctx.fillStyle = "#f5f5f5"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(n, 160, 160);
    }
    function clearCanvas() { ctx.clearRect(0,0,320,320); }
    function changeColor(c) { ctx.strokeStyle = c; }

    // HOẠT ĐỘNG LOGIC
    function ask(el, val) { targetEl = el; correctVal = val; document.getElementById('picker').style.display='flex'; }
    function check(n) {
        if(n === correctVal) { 
            if(targetEl.classList.contains('flag-top')) { targetEl.innerText = n; targetEl.style.background = "#4caf50"; }
            else { targetEl.innerText = n; targetEl.classList.add('correct'); }
            alert("Đúng rồi! Bé giỏi quá! 🌟"); document.getElementById('picker').style.display='none';
        } else alert("Chưa đúng, bé đếm lại nhé!");
    }

    window.onload = init;
</script>
</body>
</html>
