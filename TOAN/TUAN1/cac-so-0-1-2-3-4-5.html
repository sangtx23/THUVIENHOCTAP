<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bài 1: Các số 0, 1, 2, 3, 4, 5</title>
    <style>
        :root { --sky: #e3f2fd; --pink: #f06292; --blue: #0288d1; --green: #4caf50; --amber: #ff8f00; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: var(--sky); overflow: hidden; touch-action: manipulation; }
        
        .header { background: white; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #ffca28; position: relative; z-index: 10; }
        .header h2 { color: #f44336; margin: 0; font-size: 16px; text-transform: uppercase; }
        .btn-exit { position: absolute; left: 10px; border: none; background: #f44336; color: white; border-radius: 12px; padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 3px #b71c1c; }

        .page { display: none; width: 100vw; height: calc(100vh - 50px); flex-direction: column; align-items: center; padding: 10px 0; box-sizing: border-box; overflow-y: auto; }
        .page.active { display: flex; }

        /* KHÁM PHÁ - DÙNG ẢNH */
        .kp-container { position: relative; width: 95%; max-width: 500px; margin: 0 auto; }
        .kp-img { width: 100%; display: block; border-radius: 20px; border: 5px solid #81d4fa; }
        .hotspot-num { position: absolute; width: 12%; height: 9%; background: transparent; cursor: pointer; border-radius: 50%; }

        /* TẬP VIẾT */
        .write-container { display: flex; flex-direction: row; align-items: flex-start; justify-content: center; gap: 10px; width: 98%; max-width: 650px; margin: 5px 0; }
        .guide-box { flex: 1; background: white; border: 2px solid #ffca28; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; min-height: 180px; }
        .writing-area { flex: 2.5; background: white; border: 3px solid #90caf9; border-radius: 15px; position: relative; aspect-ratio: 1 / 1; max-height: 55vh; background-image: linear-gradient(#90caf9 2px, transparent 2px), linear-gradient(90deg, #90caf9 2px, transparent 2px); background-size: 25% 25%; }
        canvas { width: 100% !important; height: 100% !important; display: block; touch-action: none; position: absolute; top: 0; left: 0; }

        /* BÀI TẬP */
        .card { width: 94%; background: white; border-radius: 15px; padding: 15px; border: 3px solid var(--pink); margin-bottom: 15px; box-sizing: border-box; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .quiz-item { border: 1px solid #fce4ec; border-radius: 15px; padding: 10px; text-align: center; background: #fffafb; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .img-wrap { height: 75px; width: 100%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .img-wrap img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .ans { width: 50px; height: 35px; background: #fff8e1; border: 2px dashed #ffb300; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #ff6f00; cursor: pointer; font-size: 18px; }
        .ans.correct { background: var(--green) !important; color: white !important; border-style: solid !important; }

        /* LÁ CỜ BÀI 3 */
        .flag-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; }
        .flag-img { width: 100%; display: block; border-radius: 10px; }
        .flag-touch { position: absolute; top: 15%; width: 12%; height: 25%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #d32f2f; }
        .flag-touch.solved { color: #212121; font-size: 28px; background: transparent; }

        .nav-bar { width: 90%; display: flex; gap: 10px; margin-top: auto; padding-bottom: 15px; }
        .btn-nav { flex: 1; padding: 15px; border-radius: 30px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px #ccc; }
        .btn-n { border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; height: 45px; font-size: 18px; box-shadow: 0 3px #999; }
    </style>
</head>
