<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luyện Tập - Trang 12, 13</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
    <style>
        :root { --sky: #e3f2fd; --blue: #0288d1; --green: #4caf50; --amber: #ff8f00; --red: #f44336; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: var(--sky); overflow-x: hidden; touch-action: manipulation; }
        
        .header { background: white; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #ffca28; position: sticky; top: 0; z-index: 100; }
        .header h2 { color: var(--red); margin: 0; font-size: 16px; text-transform: uppercase; }
        .btn-exit { position: absolute; left: 10px; border: none; background: var(--red); color: white; border-radius: 12px; padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 3px #b71c1c; }

        .page { display: none; width: 100vw; flex-direction: column; align-items: center; padding: 10px 0; box-sizing: border-box; }
        .page.active { display: flex; }

        .quiz-container { position: relative; width: 95%; max-width: 650px; margin: 0 auto; background: white; border-radius: 20px; border: 4px solid #90caf9; padding: 5px; box-sizing: border-box; }
        .quiz-img { width: 100%; display: block; border-radius: 15px; }
        
        /* CHẾ ĐỘ TEXT THUẦN TÚY */
        .box-ans { 
            position: absolute; background: transparent; border: none; 
            width: 8%; height: 7%; display: flex; align-items: center; 
            justify-content: center; font-weight: normal; color: #333; 
            cursor: pointer; font-size: 26px; z-index: 5; 
        }
        .box-ans.correct { color: #2e7d32; font-weight: bold; transform: scale(1.2); }

        /* VÒNG TRÒN CHO BÀI CHỌN SỐ (BÀI 1) */
        .circle-ans { 
            position: absolute; border: 4px solid transparent; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            color: transparent; font-size: 22px; font-weight: bold; z-index: 5;
        }
        .circle-ans.show { border-color: #0288d1; color: #0288d1; background: rgba(2, 136, 209, 0.1); }

        .nav-bar { width: 90%; display: flex; gap: 10px; margin: 15px 0; padding-bottom: 20px; }
        .btn-nav { flex: 1; padding: 12px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 4px #ccc; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-exit" onclick="location.href='../../index.html'">⬅ THOÁT</button>
    <h2>LUYỆN TẬP (TRANG 12-13)</h2>
</div>

        <div class="circle-ans" style="top: 15%; left: 43.5%; width: 6%; height: 7%;" onclick="checkCircle(this)"></div>

    </div>

        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p2')">BÀI 2 ➡</button>
    </div>
</div>

    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p2')">⬅ BÀI 2</button>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p4')">BÀI 4 ➡</button>
    </div>
</div>

    <p style="text-align:center; font-weight:bold; color:#0288d1; margin: 5px;">Bài 4: Số?</p>
    <div class="quiz-container">
        <img src="../../img/b4-13.PNG" class="quiz-img">
        <div class="box-ans" style="top: 89%; left: 7.5%;" onclick="ask(this, 3)">?</div>
        <div class="box-ans" style="top: 76.5%; left: 45%;" onclick="ask(this, 4)">?</div>

        <div class="box-ans" style="top: 89%; left: 82.5%;" onclick="ask(this, 0)">?</div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p3')">⬅ BÀI 3</button>
    </div>
</div>

</div>
