<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luyện Tập Trang 12-13</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
    <style>
        :root { --sky: #e3f2fd; --blue: #0288d1; --red: #f44336; }
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: var(--sky); touch-action: manipulation; }
        
        .header { background: white; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #ffca28; position: sticky; top: 0; z-index: 100; }
        .header h2 { color: var(--red); margin: 0; font-size: 16px; text-transform: uppercase; }
        .btn-exit { position: absolute; left: 10px; border: none; background: var(--red); color: white; border-radius: 12px; padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; }

        .page { display: none; width: 100vw; flex-direction: column; align-items: center; padding: 10px 0; }
        .page.active { display: flex; }
        .quiz-container { position: relative; width: 95%; max-width: 650px; background: white; border-radius: 20px; border: 4px solid #90caf9; padding: 5px; box-sizing: border-box; }
        .quiz-img { width: 100%; display: block; border-radius: 15px; pointer-events: none; }

        /* Vùng chạm chung */
        .touch-point { 
            position: absolute; border: 2px solid transparent; border-radius: 50%; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }

        /* 1. Hiệu ứng ĐÚNG: Vòng tròn xanh mảnh cố định */
        .touch-point.is-correct.active { 
            border-color: var(--blue); background: rgba(2, 136, 209, 0.1); 
            pointer-events: none; 
        }

        /* 2. Hiệu ứng SAI: Vòng tròn đỏ sáng bóng, nhấp nháy 0.3s rồi biến mất */
        @keyframes wrong-effect {
            0% { opacity: 0; transform: scale(0.7); }
            50% { opacity: 1; transform: scale(1); border-color: #ff5252; box-shadow: 0 0 15px #ff5252, inset 0 0 10px white; background: rgba(255,0,0,0.1); }
            100% { opacity: 0; transform: scale(1.2); }
        }
        .touch-point.is-wrong.flash { animation: wrong-effect 0.3s ease-out forwards; }
        .touch-point.is-wrong::after {
            content: '✖'; color: #f44336; font-size: 18px; font-weight: bold; opacity: 0;
        }
        .touch-point.is-wrong.flash::after { opacity: 1; }

        .nav-bar { width: 90%; display: flex; gap: 10px; margin: 15px 0; }
        .btn-nav { flex: 1; padding: 12px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px #ccc; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-exit" onclick="location.href='../../index.html'">⬅ THOÁT</button>
    <h2>LUYỆN TẬP (TRANG 12-13)</h2>
</div>

<div id="p1" class="page active">
    <p style="text-align:center; font-weight:bold; color:var(--blue); margin:5px;">Bài 1: Chọn số thích hợp</p>
    <div class="quiz-container">
        <img src="../../img/b1-12.PNG" class="quiz-img">
        
        <div class="touch-point is-wrong" style="top:12%; left:85.5%; width:5%; height:9%;"></div>
        <div class="touch-point is-correct" style="top:12%; left:92%; width:5%; height:9%;"></div> <div class="touch-point is-wrong" style="top:12%; left:97.5%; width:5%; height:9%;"></div>

        <div class="touch-point is-wrong" style="top:56%; left:3.5%; width:5%; height:9%;"></div>
        <div class="touch-point is-wrong" style="top:56%; left:9.5%; width:5%; height:9%;"></div>
        <div class="touch-point is-correct" style="top:56%; left:16%; width:5%; height:9%;"></div> <div class="touch-point is-correct" style="top:46%; left:85.5%; width:5%; height:9%;"></div> <div class="touch-point is-wrong" style="top:46%; left:92%; width:5%; height:9%;"></div>
        <div class="touch-point is-wrong" style="top:46%; left:97.5%; width:5%; height:9%;"></div>

        <div class="touch-point is-wrong" style="top:88%; left:3.5%; width:5%; height:9%;"></div>
        <div class="touch-point is-wrong" style="top:88%; left:9.5%; width:5%; height:9%;"></div>
        <div class="touch-point is-correct" style="top:88%; left:16%; width:5%; height:9%;"></div> <div class="touch-point is-wrong" style="top:86%; left:77.5%; width:5%; height:9%;"></div>
        <div class="touch-point is-correct" style="top:86%; left:83.5%; width:5%; height:9%;"></div> <div class="touch-point is-wrong" style="top:86%; left:89.5%; width:5%; height:9%;"></div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p2')">BÀI 2 ➡</button>
    </div>
</div>

<div id="p2" class="page">
    <p style="text-align:center; font-weight:bold; color:var(--blue); margin:5px;">Bài 2: Chọn sơ đồ đúng</p>
    <div class="quiz-container">
        <img src="../../img/b2-12.PNG" class="quiz-img">
        <div class="touch-point is-correct" style="top:18%; left:62%; width:10%; height:15%; border-radius:10px;"></div>
        <div class="touch-point is-wrong" style="top:18%; left:78%; width:10%; height:15%; border-radius:10px;"></div>
        <div class="touch-point is-wrong" style="top:74%; left:62%; width:10%; height:15%; border-radius:10px;"></div>
        <div class="touch-point is-correct" style="top:74%; left:78%; width:10%; height:15%; border-radius:10px;"></div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p1')">⬅ BÀI 1</button>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p3')">bÀI 3 ➡</button>
    </div>
</div>

<div id="p3" class="page">
    <p style="text-align:center; font-weight:bold; color:var(--blue); margin:5px;">Bài 3 & 4: Điền số vào dấu ?</p>
    <div class="quiz-container">
        <img src="../../img/b3-13.PNG" class="quiz-img" style="margin-bottom:10px;">
        <img src="../../img/b4-13.PNG" class="quiz-img">
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p2')">⬅ BÀI 2</button>
    </div>
</div>

<script>
    const sndDung = new Audio('../../audio/dung.mp3');
    const sndSai = new Audio('../../audio/sai.mp3');

    document.addEventListener('click', function(e) {
        const el = e.target;
        if (!el.classList.contains('touch-point')) return;

        if (el.classList.contains('is-correct')) {
            if (el.classList.contains('active')) return;
            el.classList.add('active');
            play(sndDung);
            if (typeof confetti === 'function') {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, zIndex: 2000 });
            }
        } else {
            el.classList.add('flash');
            play(sndSai);
            setTimeout(() => el.classList.remove('flash'), 300);
        }
    });

    function play(s) { s.pause(); s.currentTime = 0; s.play().catch(e=>{}); }
    function goPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
