<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luyện Tập - Trang 12, 13</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --sky: #e3f2fd; --blue: #0288d1; --green: #4caf50; --amber: #ff8f00; --red: #f44336; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: var(--sky); touch-action: manipulation; }
        
        .header { background: white; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #ffca28; position: sticky; top: 0; z-index: 100; }
        .header h2 { color: var(--red); margin: 0; font-size: 16px; text-transform: uppercase; }
        .btn-exit { position: absolute; left: 10px; border: none; background: var(--red); color: white; border-radius: 12px; padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 3px #b71c1c; }

        .page { display: none; width: 100vw; flex-direction: column; align-items: center; padding: 10px 0; box-sizing: border-box; }
        .page.active { display: flex; }

        .quiz-container { position: relative; width: 95%; max-width: 650px; margin: 0 auto; background: white; border-radius: 20px; border: 4px solid #90caf9; padding: 5px; box-sizing: border-box; }
        .quiz-img { width: 100%; display: block; border-radius: 15px; }
        
        /* Ô trống có dấu hỏi */
        .box-ans { position: absolute; background: white; border: 2px solid #0288d1; width: 8%; height: 7%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0288d1; cursor: pointer; border-radius: 8px; font-size: 18px; }
        .box-ans.correct { background: #e8f5e9; border: 2px solid #4caf50; color: #2e7d32; transform: scale(1.1); }

        /* Vòng tròn ẩn - chỉ hiện khi đúng */
        .circle-ans { position: absolute; border: 3px solid transparent; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-weight: bold; font-size: 18px; }
        .circle-ans.show { border-color: #0288d1; color: #0288d1; background: rgba(2, 136, 209, 0.1); }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .nav-bar { width: 90%; display: flex; gap: 10px; margin: 15px 0; padding-bottom: 20px; }
        .btn-nav { flex: 1; padding: 12px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 4px #ccc; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-exit" onclick="location.href='../../index.html'">⬅ THOÁT</button>
    <h2>LUYỆN TẬP (TRANG 12-13)</h2>
</div>

<div id="p12-1" class="page active">
    <p style="text-align:center; font-weight:bold; color:#0288d1; margin: 5px;">Bài 1: Chọn số thích hợp với số con vật</p>
    <div class="quiz-container">
        <img src="../../img/b1-12.jpg" class="quiz-img">
        <div class="circle-ans" style="top: 15%; left: 43.5%; width: 6%; height: 7%;" onclick="checkCircle(this, 3, 3)">3</div>
        <div class="circle-ans" style="top: 12%; left: 91.5%; width: 6%; height: 7%;" onclick="checkCircle(this, 2, 2)">2</div>
        <div class="circle-ans" style="top: 56.5%; left: 8.5%; width: 6%; height: 7%;" onclick="checkCircle(this, 5, 5)">5</div>
        <div class="circle-ans" style="top: 45.5%; left: 91.5%; width: 6%; height: 7%;" onclick="checkCircle(this, 1, 1)">1</div>
        <div class="circle-ans" style="top: 88.5%; left: 8.5%; width: 6%; height: 7%;" onclick="checkCircle(this, 3, 3)">3</div>
        <div class="circle-ans" style="top: 86.5%; left: 85%; width: 6%; height: 7%;" onclick="checkCircle(this, 4, 4)">4</div>
    </div>
    <div class="nav-bar">
        <div style="flex:1"></div>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p13-3')">TRANG 13 ➡</button>
    </div>
</div>

<div id="p13-3" class="page">
    <p style="text-align:center; font-weight:bold; color:#0288d1; margin: 5px;">Bài 3: Số?</p>
    <div class="quiz-container">
        <img src="../../img/b3-13.jpg" class="quiz-img">
        <div class="box-ans" style="top: 31%; left: 45.5%;" onclick="ask(this, 2)">?</div>
        <div class="box-ans" style="top: 31%; left: 68.5%;" onclick="ask(this, 4)">?</div>
        <div class="box-ans" style="top: 64.5%; left: 45.5%;" onclick="ask(this, 5)">?</div>
        <div class="box-ans" style="top: 64.5%; left: 68.5%;" onclick="ask(this, 3)">?</div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p12-1')">⬅ TRANG 12</button>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('p13-4')">BÀI 4 ➡</button>
    </div>
</div>

<div id="p13-4" class="page">
    <p style="text-align:center; font-weight:bold; color:#0288d1; margin: 5px;">Bài 4: Đếm số lượng</p>
    <div class="quiz-container">
        <img src="../../img/b4-13.jpg" class="quiz-img">
        <div class="box-ans" style="top: 89%; left: 7.5%;" onclick="ask(this, 3)">?</div>
        <div class="box-ans" style="top: 76.5%; left: 45%;" onclick="ask(this, 4)">?</div>
        <div class="box-ans" style="top: 89%; left: 45%;" onclick="ask(this, 1)">?</div>
        <div class="box-ans" style="top: 76.5%; left: 82.5%;" onclick="ask(this, 5)">?</div>
        <div class="box-ans" style="top: 89%; left: 82.5%;" onclick="ask(this, 0)">?</div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('p13-3')">⬅ BÀI 3</button>
    </div>
</div>

<div id="picker" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:2000;">
    <div style="background:white;padding:20px;border-radius:20px;width:85%;max-width:320px;text-align:center;">
        <p><b id="pickerTitle">Bé chọn số mấy?</b></p>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin:20px 0;" id="pg"></div>
        <button onclick="document.getElementById('picker').style.display='none'" style="border:none;background:#eee;padding:10px 20px;border-radius:10px;">ĐÓNG</button>
    </div>
</div>

<script>
    const cfg = { 
        clrs: ['#90a4ae','#f44336','#4caf50','#ff9800','#9c27b0','#2196f3'], 
        sndCorrect: '../../audio/dung.mp3', 
        sndWrong: '../../audio/sai.mp3' 
    };
    let targetEl = null, correctVal = null;

    function init() {
        const pg = document.getElementById('pg');
        for(let i=0; i<=5; i++) {
            let btn = document.createElement('button');
            btn.innerText = i; btn.style.height = "55px"; btn.style.fontSize = "22px";
            btn.style.background = cfg.clrs[i]; btn.style.color = "white"; btn.style.border = "none"; btn.style.borderRadius = "10px";
            btn.onclick = () => check(i);
            pg.appendChild(btn);
        }
    }

    function ask(el, v) { 
        targetEl = el; correctVal = v; 
        document.getElementById('picker').style.display = 'flex'; 
    }

    function checkCircle(el, v, correct) {
        if(v === correct) {
            el.classList.add('show');
            fireFireworks();
            new Audio(cfg.sndCorrect).play().catch(()=>{});
        } else {
            new Audio(cfg.sndWrong).play().catch(()=>{});
        }
    }

    function fireFireworks() {
        var duration = 2 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 3000 };
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }
        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 40 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }

    function check(n) {
        if(n === correctVal) {
            fireFireworks();
            targetEl.innerText = n; 
            targetEl.classList.add('correct');
            new Audio(cfg.sndCorrect).play().catch(()=>{});
            setTimeout(() => { document.getElementById('picker').style.display = 'none'; }, 500);
        } else {
            new Audio(cfg.sndWrong).play().catch(()=>{});
            targetEl.style.animation = "shake 0.5s";
            setTimeout(() => { targetEl.style.animation = ""; }, 500);
        }
    }

    function goPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
    window.onload = init;
</script>
</body>
</html>
