<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luyện Tập - Trang 10, 11</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --sky: #e3f2fd; --blue: #0288d1; --green: #4caf50; --amber: #ff8f00; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: var(--sky); overflow-x: hidden; touch-action: manipulation; }
        
        .header { background: white; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #ffca28; position: relative; z-index: 10; }
        .header h2 { color: #f44336; margin: 0; font-size: 16px; text-transform: uppercase; }
        .btn-exit { position: absolute; left: 10px; border: none; background: #f44336; color: white; border-radius: 12px; padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 3px #b71c1c; }

        .page { display: none; width: 100vw; height: calc(100vh - 50px); flex-direction: column; align-items: center; padding: 10px 0; box-sizing: border-box; overflow-y: auto; }
        .page.active { display: flex; }

        .quiz-container { position: relative; width: 95%; max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; border: 4px solid #90caf9; padding: 5px; box-sizing: border-box; }
        .quiz-img { width: 100%; display: block; border-radius: 15px; }
        
        .box-ans { position: absolute; background: white; border: 2px solid #0288d1; width: 10%; height: 8%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0288d1; cursor: pointer; border-radius: 8px; font-size: 18px; transition: 0.2s; }
        .box-ans.correct { background: #e8f5e9; border: 2px solid #4caf50; color: #2e7d32; transform: scale(1.1); }

        /* Hiệu ứng rung khi chọn sai */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .nav-bar { width: 90%; display: flex; gap: 10px; margin: 15px 0; padding-bottom: 20px; }
        .btn-nav { flex: 1; padding: 12px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 4px #ccc; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-exit" onclick="location.href='../../index.html'">⬅ THOÁT</button>
    <h2>LUYỆN TẬP (TRANG 10-11)</h2>
</div>

<div id="lt1" class="page active">
    <p style="text-align:center; font-weight:bold; color:#0288d1; margin: 5px;">Bài 1: Số?</p>
    <div class="quiz-container">
        <img src="../../img/b1-10.PNG" class="quiz-img">
        <div class="box-ans" style="top: 41%; left: 45.5%;" onclick="ask(this, 3)">?</div>
        <div class="box-ans" style="top: 41%; left: 79%;" onclick="ask(this, 2)">?</div>
        <div class="box-ans" style="top: 89%; left: 12%;" onclick="ask(this, 4)">?</div>
        <div class="box-ans" style="top: 89%; left: 45.5%;" onclick="ask(this, 1)">?</div>
        <div class="box-ans" style="top: 89%; left: 79%;" onclick="ask(this, 5)">?</div>
    </div>
    <div class="nav-bar">
        <div style="flex:1"></div>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('lt2')">BÀI 2 ➡</button>
    </div>
</div>

<div id="lt2" class="page">
    <p style="text-align:center; font-weight:bold; color:#0288d1; margin: 5px;">Bài 2: Số?</p>
    <div class="quiz-container">
        <img src="../../img/b2-10.PNG" class="quiz-img">
        <div class="box-ans" style="top: 39%; left: 36.5%; width: 7.5%; height: 16%;" onclick="ask(this, 4)">?</div>
        <div class="box-ans" style="top: 39%; left: 56%; width: 7.5%; height: 16%;" onclick="ask(this, 2)">?</div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('lt1')">⬅ BÀI 1</button>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('lt3')">BÀI 3 ➡</button>
    </div>
</div>

<div id="lt3" class="page">
    <p style="text-align:center; font-weight:bold; color:#0288d1; margin: 5px;">Bài 3: Có bao nhiêu củ cà rốt đã tô màu?</p>
    <div class="quiz-container">
        <img src="../../img/b3-10.PNG" class="quiz-img" onclick="wrong()">
        <div style="position:absolute; top:11%; left:0; width:100%; height:12%;" onclick="askTarget(this, 3)"></div>
        <div style="position:absolute; top:25%; left:0; width:100%; height:12%;" onclick="askTarget(this, 2)"></div>
        <div style="position:absolute; top:39%; left:0; width:100%; height:12%;" onclick="askTarget(this, 4)"></div>
        <div style="position:absolute; top:53%; left:0; width:100%; height:12%;" onclick="askTarget(this, 1)"></div>
        <div style="position:absolute; top:67%; left:0; width:100%; height:12%;" onclick="askTarget(this, 5)"></div>
        <div style="position:absolute; top:81%; left:0; width:100%; height:12%;" onclick="askTarget(this, 0)"></div>
    </div>
    <div class="nav-bar">
        <button class="btn-nav" style="background:#90a4ae;" onclick="goPage('lt2')">⬅ BÀI 2</button>
        <button class="btn-nav" style="background:var(--amber);" onclick="goPage('lt4')">BÀI 4 ➡</button>
    </div>
</div>

<div id="lt4" class="page">
    <p style="text-align:center; font-weight:bold;
